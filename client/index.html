    <!-- Google Tag Manager - Consent-Aware Loading -->
    <script>
      // Only load Google Tag if user has consented and tracking ID is configured
      (function() {
        const GTAG_ID = 'AW-930165975';
        const isProduction = window.location.hostname !== 'localhost' && !window.location.hostname.includes('replit.dev');
        let gtagInitialized = false; // Guard to prevent duplicate initialization
        
        // Function to check cookie consent
        function hasAnalyticsConsent() {
          try {
            const preferences = localStorage.getItem('cookie-preferences');
            if (!preferences) return false;
            
            const parsed = JSON.parse(preferences);
            // Load gtag if user accepted targeting OR analytics cookies
            return parsed.targeting === true || parsed.analytics === true;
          } catch (e) {
            return false;
          }
        }
        
        // Function to initialize Google Tag
        function initializeGoogleTag() {
          // Prevent duplicate initialization
          if (gtagInitialized) {
            console.log('[Google Tag] Already initialized, skipping duplicate load');
            return;
          }
          
          if (!GTAG_ID || !isProduction) {
            console.log('[Google Tag] Skipped: ' + (!GTAG_ID ? 'No tracking ID configured' : 'Not production environment'));
            return;
          }
          
          if (!hasAnalyticsConsent()) {
            console.log('[Google Tag] Skipped: User has not consented to analytics/targeting cookies');
            return;
          }
          
          console.log('[Google Tag] Loading with consent...');
          
          // Mark as initialized before loading
          gtagInitialized = true;
          
          // Load gtag.js script
          var script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=' + GTAG_ID;
          document.head.appendChild(script);
          
          // Initialize dataLayer and gtag
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          
          gtag('js', new Date());
          gtag('config', GTAG_ID);
          
          console.log('[Google Tag] Initialized successfully');
        }
        
        // Check consent on page load
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initializeGoogleTag);
        } else {
          initializeGoogleTag();
        }
        
        // Re-check when cookie preferences change (user accepts cookies after initial rejection)
        window.addEventListener('storage', function(e) {
          if (e.key === 'cookie-preferences' && hasAnalyticsConsent()) {
            initializeGoogleTag();
          }
        });
        
        // Listen for custom cookie consent event from React components
        window.addEventListener('cookie-consent-changed', function() {
          if (hasAnalyticsConsent()) {
            initializeGoogleTag();
          }
        });
      })();
